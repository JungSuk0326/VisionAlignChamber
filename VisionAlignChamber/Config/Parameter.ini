; Vision Align Chamber Teaching Parameters
; 4-Axis Teaching Position Configuration
; Sequence: Receive -> PreCtr(FOV) -> Ready -> Scan(0->360, xN) -> Align(Center+Theta) -> Eddy -> Release

;=============================================================================
; Motion Axis Configuration
; 형식: 축이름=축번호
; 각 축별 속도/가속도/감속도 설정
;=============================================================================

[Motion_Axis]
; Wedge Up/Down Stage (Servo) - Chuck Z
WedgeUpDown=14
WedgeUpDown_Enabled=true
WedgeUpDown_Velocity=10000
WedgeUpDown_Accel=100000
WedgeUpDown_Decel=100000
WedgeUpDown_JogVelocity=10000
WedgeUpDown_JogAccel=100000
WedgeUpDown_JogDecel=100000

; Chuck Rotation (DD Motor) - Theta
ChuckRotation=11
ChuckRotation_Enabled=true
ChuckRotation_Velocity=50
ChuckRotation_Accel=500
ChuckRotation_Decel=500
ChuckRotation_JogVelocity=50
ChuckRotation_JogAccel=500
ChuckRotation_JogDecel=500

; Centering Stage 1 (Stepping) - Centering L
CenteringStage_1=12
CenteringStage_1_Enabled=true
CenteringStage_1_Velocity=5
CenteringStage_1_Accel=50
CenteringStage_1_Decel=50
CenteringStage_1_JogVelocity=5
CenteringStage_1_JogAccel=50
CenteringStage_1_JogDecel=50

; Centering Stage 2 (Stepping) - Centering R
CenteringStage_2=13
CenteringStage_2_Enabled=true
CenteringStage_2_Velocity=5
CenteringStage_2_Accel=50
CenteringStage_2_Decel=50
CenteringStage_2_JogVelocity=5
CenteringStage_2_JogAccel=50
CenteringStage_2_JogDecel=50

;=============================================================================
; Teaching Positions
;=============================================================================

[ChuckZ]
; Chuck Z Axis (Axis 0) Positions [pulse]
Down=0
Vision=125400
Eddy=34000

[CenteringL]
; Centering L Axis (Axis 2) Positions [pulse]
Open=0
MinCtr=22.65

[CenteringR]
; Centering R Axis (Axis 3) Positions [pulse]
Open=0
MinCtr=21.35

[Theta]
; Theta Axis (Axis 1) Positions [pulse or degree]
Home=0

;=============================================================================
; Vision Scan Parameters
;=============================================================================

[VisionScan]
StepAngle=14.4
ImageCount=25
WidthOffset=0.4

;=============================================================================
; PN Check Parameters (ms)
;=============================================================================

[PNCheck]
HoldTime=1000
Timeout=5000
PollInterval=50
