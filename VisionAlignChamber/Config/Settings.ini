;=============================================================================
; System 설정
;=============================================================================

[System]
; 시뮬레이션 모드 (true/false)
; true: 하드웨어 없이 UI 테스트 가능 (Initialize/Home 없이 Auto 모드 전환 가능)
; false: 실제 하드웨어 운영 모드 (Initialize → Home → Auto 순서 필요)
Simulation=true

[DLL]
; AJIN EtherCAT DLL 경로 설정
; 빈 값이면 기본 경로(실행 파일 폴더)에서 로드
; 절대 경로 또는 상대 경로 사용 가능

; AXL.dll 경로 (예: C:\AJINEXTEK\AXL\AXL.dll)
AXL_Path=

; EzBasicAxl.dll 경로 (예: C:\AJINEXTEK\AXL\EzBasicAxl.dll)
EzBasicAxl_Path=

[Vision]
; eMotionAlign.dll 경로 (비어있으면 기본 경로 사용)
eMotionAlign_Path=

; OpenCvSharp.dll 경로 (비어있으면 기본 경로 사용)
OpenCvSharp_Path=

[Camera]
; 카메라 설정
ImageWidth=5120
ImageHeight=5120
ImageCount=24
AngleStep=15.0

;=============================================================================
; Vision Aligner I/O 매핑
; 형식: 이름=모듈번호,채널번호  (예: Sensor1_Wafer_Check=0,0)
; 모듈번호 생략 시 0으로 간주
; 이름은 HardwareDefinition.cs의 VADigitalInput/VADigitalOutput enum과 일치해야 함
;=============================================================================

[IO_DI]
; Wafer Check Sensor
Sensor1_Wafer_Check=0,32
Sensor2_Wafer_Check=0,32

; P/N Checker
PN_Check_P=0,2
PN_Check_N=0,3

[IO_DO]
; Lift Pin Solenoid
LiftPin_BlowSol=2,2
LiftPin_VaccumSol=2,3

; Chuck Solenoid
Chuck_BlowSol=2,0
Chuck_VacuumSol=2,1

; Vision Light
Vision_Light=2,4

;=============================================================================
; Simulation 설정
;=============================================================================

[Simulation]
; 시뮬레이션용 Notch 이미지 폴더 경로
ImagePath_Notch=D:\#01_Projects\VisionAlignChamber_Repository\WaferAlign\ImageNotch\ImageNotch

; 시뮬레이션용 Flat 이미지 폴더 경로
ImagePath_Flat=D:\#01_Projects\VisionAlignChamber_Repository\WaferAlign\ImageFlat\ImageFlat

; 시뮬레이션용 Eddy 더미값 (기본값: 0.0)
EddyValue=0.0

; 시뮬레이션용 PN 더미값 (1=P, 0=N, 기본값: 1)
PNValue=1

;=============================================================================
; Communication 설정
;=============================================================================

[Communication]
; CTC 통신 포트 (VisionAlignChamber가 서버)
CTCPort=9998

;=============================================================================
; Motion 설정
;=============================================================================

[Motion]
; 모션 파라미터 파일 경로 (.mot)
; 비어있으면 기본 경로(Config/MotionPara.mot) 사용
; 절대 경로 또는 상대 경로 사용 가능
MotParamFile=D:\#01_Projects\VisionAlignChamber_Repository\VisionAlignChamber\bin\Debug\Config\test_AID_0305.mot

;=============================================================================
; Light 설정 (LfineLight)
;=============================================================================

[Light]
; COM 포트 번호 (1=COM1, 2=COM2, 0=사용안함)
ComPort=0

; 조명 강도 (1-100)
Power=80

; 비전 검사 시 자동 켜기 여부 (true/false)
AutoOn=true
